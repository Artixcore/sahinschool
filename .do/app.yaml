# DigitalOcean App Platform — replace YOUR_GITHUB_USERNAME/YOUR_REPO_NAME before deploy.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-specification/

name: sahin-school
region: nyc

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
